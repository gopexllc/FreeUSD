name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=ON

      - name: Build
        run: cmake --build build --parallel 4

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  linux-python:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v5
        with:
          path: build/_deps
          key: freeusd-fetchcontent-pybind-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            freeusd-fetchcontent-pybind-${{ runner.os }}-

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pytest build-essential ninja-build

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=ON
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  linux-bindings:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go build-essential ninja-build

      - name: Configure (C ABI + tests, no Python)
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: Rust bindings (freeusd-sys)
        env:
          FREEUSD_REPO_ROOT: ${{ github.workspace }}
        run: cargo test --manifest-path bindings/rust/Cargo.toml

      - name: Go bindings (CGO)
        working-directory: bindings/go
        run: go test ./...

  windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: CTest
        run: ctest --test-dir build -C Release --output-on-failure

  macos:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=ON

      - name: Build
        run: cmake --build build --parallel 4

      - name: CTest
        run: ctest --test-dir build --output-on-failure
