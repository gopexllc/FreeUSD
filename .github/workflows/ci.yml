name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tree-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Refuse tracked paths under build-*
        run: |
          set -euo pipefail
          bad="$(git ls-files | grep -E '^build-' || true)"
          if [ -n "${bad}" ]; then
            echo "::error::Tracked build-* paths must not be committed (invalid on Windows; use /build/ or ignored prefixes only)."
            printf '%s\n' "${bad}"
            exit 1
          fi

      - name: Check engine contract docs
        run: python3 scripts/check_engine_contract_docs.py

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=ON

      - name: Build
        run: cmake --build build --parallel 4

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  linux-python:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v6
        with:
          path: build/_deps
          key: freeusd-fetchcontent-pybind-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            freeusd-fetchcontent-pybind-${{ runner.os }}-

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pip build-essential ninja-build
          # Ubuntu python3-pytest is often < 9.0.3; ctest needs pytest with CVE-2025-71176 fix.
          python3 -m pip install --upgrade --break-system-packages "pytest>=9.0.3"

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=ON
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: CTest
        run: ctest --test-dir build --output-on-failure

  linux-bindings:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y golang-go build-essential ninja-build

      - name: Configure (C ABI + tests, no Python)
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=OFF

      - name: Build
        run: cmake --build build --parallel 4

      - name: Rust bindings (freeusd-sys)
        env:
          FREEUSD_REPO_ROOT: ${{ github.workspace }}
        run: cargo test --manifest-path bindings/rust/Cargo.toml

      - name: Go bindings (CGO)
        working-directory: bindings/go
        run: go test ./...

  windows:
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Dependencies
        run: vcpkg install zlib:x64-windows

      - name: Configure
        run: >
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=ON

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: CTest
        run: ctest --test-dir build -C Release --output-on-failure

  macos:
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DFREEUSD_BUILD_PYTHON=OFF
          -DFREEUSD_BUILD_TESTS=ON
          -DFREEUSD_TEST_INSTALL_INTEGRATION=ON

      - name: Build
        run: cmake --build build --parallel 4

      - name: CTest
        run: ctest --test-dir build --output-on-failure
